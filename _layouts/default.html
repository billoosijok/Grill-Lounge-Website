<!DOCTYPE html>
<html lang="{{ page.lang | default: 'fr' }}">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Title and Description are set dynamically per page/language -->
    <title>{{ page.title | default: 'Grill Lounge' }}</title>
    <meta name="description" content="{{ page.description | default: 'Steakhouse élégant proposant des steaks savoureux. Personnel amical, saveurs uniques et atmosphère accueillante' }}" />

    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Google Consent Mode v2 Default State -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      var consentChoice = localStorage.getItem('cookie-consent-choice');
      var consentState = consentChoice === 'accepted' ? 'granted' : 'denied';

      gtag('consent', 'default', {
        'ad_storage': consentState,
        'ad_user_data': consentState,
        'ad_personalization': consentState,
        'analytics_storage': consentState
      });
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DQYS58J1H6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-DQYS58J1H6');
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Goudy+Bookletter+1911&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>
    <div id="root">
        {{ content }}
    </div>

    <!-- Cookie Consent Banner Include -->
    {% include cookie-consent.html %}

    <!-- Vanilla Javascript Logic -->
    <script src="/assets/js/main.js"></script>
  </body>
</html>
