{% assign lang = page.lang | default: site.lang %}
{% assign t = site.data.translations[lang].map %}
<section class="map-section" style="background-color: var(--white); padding: 80px 5%;">
    <div style="text-align: center; margin-bottom: 50px;">
        <div class="section-subtitle">{{ t.subtitle }}</div>
        <h2 class="section-title">{{ t.title }}</h2>
        <p class="about-desc" style="max-width: 600px; margin: 0 auto;">{{ t.desc }}</p>
    </div>

    <div class="map-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 1100px; margin: 0 auto; align-items: stretch;">
        <div style="background-color: var(--primary-bg); padding: 40px 30px; border-radius: 16px; box-shadow: var(--card-shadow); display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(0,0,0,0.02);">
            <div style="display: flex; flex-direction: column; gap: 25px;">
                <div style="display: flex; gap: 15px;">
                    <div style="color: var(--accent-red); margin-top: 3px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </div>
                    <div>
                        <h4 style="margin: 0 0 5px 0; font-size: 1.15em; font-weight: bold; color: var(--accent-green); font-family: 'Outfit', sans-serif;">{{ t.addressLabel }}</h4>
                        <p style="margin: 0; color: var(--text-main); font-size: 1.05em; line-height: 1.4;">{{ t.addressValue }}</p>
                    </div>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div style="color: var(--accent-red); margin-top: 3px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                    </div>
                    <div>
                        <h4 style="margin: 0 0 5px 0; font-size: 1.15em; font-weight: bold; color: var(--accent-green); font-family: 'Outfit', sans-serif;">{{ t.hoursLabel }}</h4>
                        <p style="margin: 0; color: var(--text-main); font-size: 1.05em; line-height: 1.4;">{{ t.hoursValue }}</p>
                    </div>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div style="color: var(--accent-red); margin-top: 3px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                    </div>
                    <div>
                        <h4 style="margin: 0 0 5px 0; font-size: 1.15em; font-weight: bold; color: var(--accent-green); font-family: 'Outfit', sans-serif;">{{ t.phoneLabel }}</h4>
                        <a href="tel:0468652742" style="margin: 0; color: var(--accent-red); font-weight: bold; text-decoration: none; font-size: 1.15em;">{{ t.phoneValue }}</a>
                    </div>
                </div>
            </div>

            <a class="cta-button" style="width: 100%; margin-top: 30px; display: flex; justify-content: center; align-items: center; gap: 8px; box-sizing: border-box;" href="{{ site.maps_url }}" target="_blank" rel="noopener">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                    <line x1="9" y1="3" x2="9" y2="18"></line>
                    <line x1="15" y1="6" x2="15" y2="21"></line>
                </svg>
                {{ t.cta }}
            </a>
        </div>

        <div style="border-radius: 16px; overflow: hidden; box-shadow: var(--card-shadow); border: 1px solid rgba(0,0,0,0.05); min-height: 350px; position: relative;">
            <iframe src="{{ site.maps_embed }}" width="100%" height="100%" style="border: 0; position: absolute; top: 0; left: 0;" allowfullscreen loading="lazy" title="Grill Lounge Location Map"></iframe>
        </div>
    </div>
</section>
