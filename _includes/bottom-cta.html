{% assign lang = page.lang | default: site.lang %}
{% assign t = site.data.translations[lang].bottom_cta %}
<section class="bottom-cta-section" style="padding: 80px 5%; text-align: center; background-color: var(--accent-green); color: var(--white);">
    <div style="max-width: 800px; margin: 0 auto;" class="animate__animated animate__fadeInUp">
        <h2 class="section-title" style="color: var(--white); font-size: 2.5em; margin-bottom: 20px;">{{ t.title }}</h2>
        <p class="about-desc" style="color: rgba(255, 255, 255, 0.9); font-size: 1.15em; line-height: 1.7; margin-bottom: 40px;">{{ t.desc }}</p>
        <div class="bottom-cta-buttons" style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
            <a class="cta-button" href="/{{ lang }}/contact/" style="background-color: var(--accent-red); padding: 12px 30px; font-size: 1.05em; display: inline-block;">{{ t.ctaBook }}</a>
            <a href="tel:0468652742" class="cta-button" style="background-color: transparent; border: 2px solid var(--white); color: var(--white); padding: 10px 28px; font-size: 1.05em; text-decoration: none; display: inline-block;">{{ t.ctaCall }}</a>
            <a class="cta-button" href="{{ site.maps_url }}" target="_blank" rel="noopener" style="background-color: var(--white); color: var(--accent-green); padding: 12px 30px; font-size: 1.05em; display: inline-block;">{{ t.ctaMap }}</a>
        </div>
    </div>
</section>
