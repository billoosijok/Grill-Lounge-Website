<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <link rel="canonical" href="https://grilllounge.fr/fr/">
    <meta http-equiv="refresh" content="0; url=/fr/">
    <script>
      var userLang = navigator.language || navigator.userLanguage || 'fr';
      if (userLang.indexOf('es') === 0) {
        window.location.replace('/es/');
      } else if (userLang.indexOf('en') === 0) {
        window.location.replace('/en/');
      } else {
        window.location.replace('/fr/');
      }
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/fr/">Grill Lounge</a>...</p>
  </body>
</html>
